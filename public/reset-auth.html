<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resetting Authentication - 5895 SKOUTER</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: white;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 90%;
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 24px;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .info {
            color: #666;
            font-size: 14px;
            margin-top: 20px;
        }

        .status {
            margin: 15px 0;
            padding: 10px;
            border-radius: 6px;
            font-size: 14px;
        }

        .status.success {
            background-color: #d1fae5;
            color: #065f46;
            border: 1px solid #a7f3d0;
        }

        .status.info {
            background-color: #dbeafe;
            color: #1e40af;
            border: 1px solid #93c5fd;
        }

        .manual-button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.2s;
        }

        .manual-button:hover {
            background: #5a67d8;
        }

        .manual-button:disabled {
            background: #9ca3af;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Optimizing Authentication</h1>
        <div class="spinner"></div>
        <p>Please wait while we optimize your authentication settings...</p>
        <div id="status"></div>
        <p class="info">This process ensures the best login experience across all devices.</p>
        
        <button id="manualCleanup" class="manual-button" style="display: none;" onclick="runManualCleanup()">
            Run Manual Cleanup
        </button>
    </div>

    <script src="/auto-auth-cleanup.js"></script>
    <script>
        let cleanupComplete = false;
        
        function updateStatus(message, type = 'info') {
            const statusDiv = document.getElementById('status');
            statusDiv.className = `status ${type}`;
            statusDiv.textContent = message;
            statusDiv.style.display = 'block';
        }
        
        function runManualCleanup() {
            const button = document.getElementById('manualCleanup');
            button.disabled = true;
            button.textContent = 'Cleaning...';
            
            updateStatus('Running manual cleanup...', 'info');
            
            // Run the comprehensive cleanup
            resetAuth();
            
            setTimeout(() => {
                updateStatus('Manual cleanup complete!', 'success');
                button.textContent = 'Cleanup Complete';
                
                setTimeout(() => {
                    window.location.href = "/?authRequired=true&cleaned=true";
                }, 1500);
            }, 2000);
        }
        
        // Enhanced reset function
        function resetAuth() {
            try {
                updateStatus('Clearing authentication data...', 'info');
                
                // Try specific auth items first
                const authItems = [
                    'auth_credentials', 
                    'auth_token', 
                    'auth_token_expiry',
                    'auth_token_version',
                    'auth_session', 
                    'auth_session_lax', 
                    'auth_session_secure'
                ];
                
                // Clear specific localStorage items
                authItems.forEach(item => {
                    localStorage.removeItem(item);
                    sessionStorage.removeItem(item);
                });
                
                // Clear specific cookies with all possible attributes
                authItems.forEach(item => {
                    // Standard clearing
                    document.cookie = `${item}=; expires=Thu, 01 Jan 1970 00:00:00 GMT; path=/`;
                    
                    // Clear with domain variations
                    document.cookie = `${item}=; expires=Thu, 01 Jan 1970 00:00:00 GMT; path=/; domain=${window.location.hostname}`;
                    document.cookie = `${item}=; expires=Thu, 01 Jan 1970 00:00:00 GMT; path=/; domain=.${window.location.hostname}`;
                    
                    // Clear with SameSite variations
                    document.cookie = `${item}=; expires=Thu, 01 Jan 1970 00:00:00 GMT; path=/; SameSite=Lax`;
                    document.cookie = `${item}=; expires=Thu, 01 Jan 1970 00:00:00 GMT; path=/; SameSite=None; Secure`;
                });
                
                updateStatus('Authentication data cleared successfully', 'success');
                console.log("Enhanced auth reset completed");
                cleanupComplete = true;
                
            } catch (error) {
                console.error("Error during auth reset:", error);
                updateStatus('Cleanup encountered an issue, but continuing...', 'info');
            }
        }
        
        // Auto-run cleanup when page loads
        window.addEventListener('load', () => {
            // Wait a moment for auto-auth-cleanup.js to run
            setTimeout(() => {
                if (!cleanupComplete) {
                    updateStatus('Running automatic cleanup...', 'info');
                    resetAuth();
                    
                    setTimeout(() => {
                        updateStatus('Cleanup complete! Redirecting...', 'success');
                        
                        // Redirect to login page
                        setTimeout(() => {
                            window.location.href = "/?authRequired=true&cleaned=true";
                        }, 2000);
                    }, 1500);
                }
            }, 1000);
        });
        
        // Show manual button if auto cleanup doesn't work
        setTimeout(() => {
            if (!cleanupComplete) {
                document.getElementById('manualCleanup').style.display = 'inline-block';
                updateStatus('Auto cleanup taking longer than expected', 'info');
            }
        }, 5000);
    </script>
</body>
</html>
